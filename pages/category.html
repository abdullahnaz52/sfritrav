<body>

<header class="site-header" id="siteHeader">
  <div class="container header-inner">
    <a href="/" class="logo">SfriTrav<span class="logo-dot">.</span>com</a>
    <nav class="main-nav" id="mainNav">
      <ul class="nav-list">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/pages/category?cat=india-news" class="nav-link">India</a></li>
        <li><a href="/pages/education" class="nav-link">📚 Education</a></li>
        <li><a href="/pages/category?cat=health" class="nav-link">Health</a></li>
        <li><a href="/pages/category?cat=sports" class="nav-link">Sports</a></li>
        <li><a href="/pages/category?cat=entertainment" class="nav-link">Entertainment</a></li>
        <li><a href="/pages/category?cat=technology" class="nav-link">Tech</a></li>
        <li><a href="/pages/category?cat=business" class="nav-link">Business</a></li>
        <li><a href="/pages/category?cat=travel" class="nav-link">Travel</a></li>
        <li><a href="/pages/category?cat=food" class="nav-link">Food</a></li>
        <li><a href="/pages/category?cat=jobs" class="nav-link">Jobs</a></li>
      </ul>
    </nav>
    <div class="header-actions">
      <a href="/pages/search" class="btn-search">🔍</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>

<main>
  <div class="cat-hero" id="catHero">
    <div class="container">
      <nav class="breadcrumb"><a href="/">Home</a><span>›</span><span id="breadcrumbCat">Category</span></nav>
      <h1 id="catHeading">Articles</h1>
      <p id="catSubheading" style="color:rgba(255,255,255,.7);font-size:.95rem;margin-top:.4rem;"></p>
    </div>
  </div>
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem;">
    <div class="sort-row">
      <span id="resultsCount" style="font-size:.85rem;color:var(--ink-muted);">Loading…</span>
      <select id="sortSelect" class="sort-select">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>
    <div class="cards-grid" id="articlesGrid">
      <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line medium" style="margin:12px"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line medium" style="margin:12px"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line medium" style="margin:12px"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-img"></div><div class="skeleton skeleton-line medium" style="margin:12px"></div></div>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn btn-outline" id="loadMoreBtn">Load More Articles</button>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-bottom" style="padding:1.25rem 0;text-align:center;font-size:.78rem;color:rgba(255,255,255,.4);">
    <div class="container"><p>&copy; <span class="footer-year"></span> SfriTrav.com | <a href="/" style="color:rgba(255,255,255,.4)">Home</a> · <a href="/privacy-policy" style="color:rgba(255,255,255,.4)">Privacy</a> · <a href="/pages/contact" style="color:rgba(255,255,255,.4)">Contact</a></p></div>
  </div>
</footer>
<button class="back-top" id="backTop">↑</button>

<!-- app.js MUST be synchronous (no defer) at end of body so it runs before inline script -->
<script src="/public/js/app.js"></script>
<script src="/public/js/ads.js" defer></script>
<script>
(function () {
  var ST   = window.SfriTrav;
  var CATS = ST.CATEGORIES;
  var params = new URLSearchParams(location.search);
  var cat  = params.get('cat') || 'all';
  var meta = CATS[cat] || { label: 'All Articles', color: 'news', emoji: '📰' };

  var CAT_DESCS = {
    health:        'Expert tips on fitness, nutrition, disease prevention and wellness for Indian lifestyles.',
    business:      'Stock market, personal finance, investing tips and economic news for Indian investors.',
    technology:    'Smartphone reviews, app guides, AI developments and tech news for Indian consumers.',
    travel:        'Budget travel guides, hidden gems and itineraries across India and the world.',
    sports:        'Cricket, IPL, football and all Indian sports — live updates, previews and analysis.',
    entertainment: 'Bollywood, Hollywood, OTT series, celebrity news and entertainment reviews.',
    jobs:          'Government jobs, UPSC, SSC, private sector openings and career advice for India.',
    food:          'Indian recipes, restaurant reviews, nutrition guides and food trends.',
    fashion:       'Style guides, beauty tips, Indian fashion trends and product recommendations.',
    'women-health':'Women\'s health, skincare, PCOS, fertility and wellness guidance for Indian women.',
    'men-health':  'Men\'s health, fitness, grooming and lifestyle tips for Indian men.',
    ayurveda:      'Ayurvedic remedies, herbs and holistic wellness rooted in traditional Indian medicine.',
    environment:   'Climate change, pollution and sustainability news relevant to India.',
    'mental-health':'Mental health awareness, stress management and therapy resources for India.',
    kids:          'Parenting tips, child development, education and activities for Indian families.',
    politics:      'Indian and global politics, elections, government policy and geopolitical analysis.',
    'india-news':  'Breaking news, current events and in-depth reporting from across India.',
    'global-news': 'International news, world affairs, diplomacy and global events.',
    education:     'Exam notifications, results, admit cards, UPSC, SSC, JKPSC, NDA, banking and competitive exams.',
  };

  var catDesc = CAT_DESCS[cat] || ('Latest ' + meta.label + ' articles on SfriTrav.');
  document.title = meta.label + ' — SfriTrav';
  document.getElementById('pageTitle').textContent = document.title;
  document.getElementById('pageDesc').content = catDesc;
  var ogT = document.getElementById('ogTitle'); if(ogT) ogT.content = meta.label + ' — SfriTrav';
  var ogD = document.getElementById('ogDesc');  if(ogD) ogD.content = catDesc;
  document.getElementById('canonicalLink').href = 'https://sfritrav.com/pages/category?cat=' + cat;
  document.getElementById('catHeading').textContent = (meta.emoji||'') + ' ' + meta.label;
  document.getElementById('breadcrumbCat').textContent = meta.label;
  var sub = document.getElementById('catSubheading'); if(sub) sub.textContent = catDesc;

  var PAGE = 1, PER = 8;

  function getArticles() {
    var all = ST.allArticles();
    var filtered = cat === 'all' ? all : all.filter(function(a){ return a.category === cat; });
    var sort = document.getElementById('sortSelect').value;
    return filtered.sort(function(a,b){
      return sort === 'oldest' ? new Date(a.date)-new Date(b.date) : new Date(b.date)-new Date(a.date);
    });
  }

  function render() {
    var arts  = getArticles();
    var grid  = document.getElementById('articlesGrid');
    var slice = arts.slice(0, PAGE * PER);
    document.getElementById('resultsCount').textContent = arts.length + ' article' + (arts.length!==1?'s':'');
    if (!slice.length) {
      grid.innerHTML = '<p style="padding:2rem 0;color:var(--ink-muted);grid-column:1/-1">No articles in this category yet — check back soon!</p>';
      return;
    }
    grid.innerHTML = slice.map(function(a, i) {
      var ci = CATS[a.category] || {label:a.category, color:'news'};
      var d  = new Date(a.date).toLocaleDateString('en-IN',{month:'short',day:'numeric',year:'numeric'});
      return '<article class="card">'
        +'<a href="/pages/article?slug='+a.slug+'" class="card-img-wrap">'
        +'<img class="card-img" src="'+ST.getImg(a.category,i)+'" alt="'+a.title.replace(/"/g,'&quot;')+'" loading="lazy">'
        +'</a><div class="card-body">'
        +'<span class="tag '+ci.color+'">'+ci.label+'</span>'
        +'<h3 class="card-title"><a href="/pages/article?slug='+a.slug+'">'+a.title+'</a></h3>'
        +'<p class="card-excerpt">'+a.excerpt+'</p>'
        +'<div class="card-meta"><time>'+d+'</time><span class="dot">·</span><span>'+a.readTime+'</span></div>'
        +'</div></article>';
    }).join('');
    document.getElementById('loadMoreWrap').style.display = slice.length < arts.length ? 'block' : 'none';
  }

  document.getElementById('sortSelect').addEventListener('change', function(){ PAGE=1; render(); });
  document.getElementById('loadMoreBtn').addEventListener('click',  function(){ PAGE++; render(); });

  render(); // instant — uses SEED articles already in window.SfriTrav

  fetch('/api/articles') // then enrich with any KV/AI articles
    .then(function(r){ return r.ok ? r.json() : {articles:[]}; })
    .then(function(d){
      if(d.articles && d.articles.length){
        var kv = d.articles;
        ST.allArticles = function(){ return kv.concat(ST.SEED||[]); };
        PAGE=1; render();
      }
    }).catch(function(){});

  document.querySelectorAll('.footer-year').forEach(function(e){ e.textContent=new Date().getFullYear(); });
  window.addEventListener('scroll', function(){
    document.getElementById('siteHeader').classList.toggle('scrolled', scrollY>50);
    document.getElementById('backTop').classList.toggle('visible', scrollY>400);
  },{passive:true});
  document.getElementById('backTop').addEventListener('click', function(e){ e.preventDefault(); scrollTo({top:0,behavior:'smooth'}); });
  var ham=document.getElementById('hamburger'), nav=document.getElementById('mainNav');
  if(ham&&nav){
    ham.addEventListener('click', function(){
      var o=nav.classList.toggle('open'); ham.classList.toggle('active',o);
      ham.setAttribute('aria-expanded',o); document.body.style.overflow=o?'hidden':'';
    });
    document.addEventListener('click', function(e){
      if(nav.classList.contains('open')&&!nav.contains(e.target)&&!ham.contains(e.target)){
        nav.classList.remove('open'); ham.classList.remove('active'); document.body.style.overflow='';
      }
    });
  }
}());
</script>
</body>
</html>
